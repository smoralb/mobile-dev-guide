<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mobile Dev Guide</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Prism.js (syntax highlighting) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-layout">

  <!-- ── Sidebar (desktop only) ────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="sidebar-logo-icon">📱</span>
        <span class="sidebar-logo-text">Mobile Dev Guide</span>
      </div>
      <div class="sidebar-search">
        <span class="sidebar-search-icon">🔍</span>
        <input id="sidebar-search" type="search" placeholder="Buscar tema..." autocomplete="off">
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
  </aside>

  <!-- ── Main ──────────────────────────────────────────── -->
  <div class="main-content">

    <!-- Header (mobile only) -->
    <header class="app-header">
      <span class="header-title">
        <span class="platform-dot android" id="header-dot"></span>
        <span id="header-title-text">Mobile Dev Guide</span>
      </span>
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="search" placeholder="Buscar..." autocomplete="off" autocorrect="off">
      </div>
    </header>

    <!-- Platform tabs -->
    <div class="platform-tabs">
      <button class="platform-tab active" data-platform="android">
        <span class="tab-icon">🤖</span>
        <span>Android</span>
      </button>
      <button class="platform-tab" data-platform="ios">
        <span class="tab-icon">🍎</span>
        <span>iOS</span>
      </button>
    </div>

    <!-- Section nav (Básicos / Senior) -->
    <nav class="section-nav" id="section-nav"></nav>

    <!-- Search results header -->
    <div class="search-results-header" id="search-results-header"></div>

    <!-- Cards content -->
    <main class="content-area" id="content-area"></main>

  </div><!-- /main-content -->
</div><!-- /app-layout -->

<!-- Content data -->
<script src="js/content/android-basics.js"></script>
<script src="js/content/android-senior.js"></script>
<script src="js/content/ios-basics.js"></script>
<script src="js/content/ios-senior.js"></script>

<!-- Prism.js core + languages -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-kotlin.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-swift.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-xml-doc.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>

<!-- App -->
<script src="js/app.js"></script>

</body>
</html>
